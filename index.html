<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our 50-State Journey 🗺️</title>
  
  <!-- Link to CSS external file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Our 50-State Journey 🗺️</h1>
      <p>Exploring America, one state at a time!</p>
      
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-text" id="progressText">0 / 50 States Visited</div>
      </div>
    </header>

    <div class="dashboard">
      <!-- STATE GRID MAP -->
      <section class="map-section">
        <h2 class="section-title">The Map</h2>
        <p class="section-subtext">Tap a visited state to view our passport stamp & details!</p>
        <div class="map-grid" id="mapGrid"></div>
      </section>

      <!-- PASSPORT STAMPS COLLECTION -->
      <section class="passport-section">
        <h2 class="section-title">Passport Stamp Collection 🛂</h2>
        <div class="stamp-grid" id="stampGrid"></div>
      </section>
    </div>
  </div>

  <!-- MEMORY MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Link to JS external file -->
  <script src="app.js"></script>
</body>
</html>
