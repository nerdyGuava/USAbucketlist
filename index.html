<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our 50-State Journey 🗺️</title>
  
  <!-- D3.js and TopoJSON CDNs for interactive vector maps -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <!-- Link to CSS external file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Our 50-State Journey 🗺️</h1>
      <p>Exploring America, one state at a time!</p>
      
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-text" id="progressText">0 / 50 States Visited</div>
      </div>
    </header>

    <div class="dashboard">
      <!-- INTERACTIVE MAP SECTION -->
      <section class="map-section">
        <h2 class="section-title">The Map</h2>
        <p class="section-subtext">Pinch to zoom or scroll around. Tap a visited state to see our passport stamp!</p>
        
        <!-- Zoom Control Buttons -->
        <div class="map-controls">
          <button id="zoomInBtn" title="Zoom In">+</button>
          <button id="zoomOutBtn" title="Zoom Out">−</button>
          <button id="resetZoomBtn" title="Reset Map">Reset</button>
        </div>

        <!-- SVG Map Container -->
        <div class="map-container" id="mapContainer">
          <svg id="mapSvg"></svg>
        </div>
      </section>

      <!-- PASSPORT STAMPS COLLECTION -->
      <section class="passport-section">
        <h2 class="section-title">Passport Stamp Collection 🛂</h2>
        <div class="stamp-grid" id="stampGrid"></div>
      </section>
    </div>
  </div>

  <!-- MEMORY MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Link to JS external file -->
  <script src="app.js"></script>
</body>
</html>
