<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our 50-State Journey 🗺️</title>
  
  <!-- D3.js and TopoJSON CDNs -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Our 50-State Journey 🗺️</h1>
      <p>Exploring America, one state at a time!</p>
      
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-text" id="progressText">0 / 50 States </div>
      </div>
    </header>

    <div class="dashboard">
      <!-- INTERACTIVE MAP SECTION -->
      <section class="map-section">
        <h2 class="section-title">The Map</h2>
        <p class="section-subtext">Pinch to zoom or scroll around. Tap a visited state to see our passport stamp!</p>
        
        <!-- Zoom Control Buttons -->
        <div class="map-controls">
          <button id="zoomInBtn" title="Zoom In">+</button>
          <button id="zoomOutBtn" title="Zoom Out">−</button>
          <button id="resetZoomBtn" title="Reset Map">Reset</button>
        </div>

        <!-- SVG Map Container -->
        <div class="map-container" id="mapContainer">
          <svg id="mapSvg"></svg>
        </div>
      </section>

      <!-- PASSPORT STAMPS COLLECTION -->
      <section class="passport-section">
        <h2 class="section-title">Passport Collection </h2>
        <div class="stamp-grid" id="stampGrid"></div>
      </section>

      <!-- TROPHY CASE / BADGES SECTION -->
      <section class="passport-section">
        <h2 class="section-title">Trophy Case & Badges 🏆</h2>
        <p class="section-subtext">Unlock special achievements as you explore more together!</p>
        <div class="badge-grid" id="badgeGrid"></div>
      </section>

    <!-- ==========================================================
     STAMPS GALLERY SECTION
     ========================================================== -->
     <section class="dashboard-section">
        <div class="dashboard-card">
          <h2 class="section-title">Stamp Collection </h2>
          
          <div id="stampsGalleryGrid" class="stamps-grid">
            <!-- JS will render stamps here -->
          </div>
        </div>
      </section>

    </div>
  </div>

  <!-- MEMORY MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- FULL GALLERY LIGHTBOX -->
<div id="galleryOverlay" class="modal-overlay" style="display: none; z-index: 2000;">
    <div class="gallery-container">
      <button id="galleryClose" class="close-btn">&times;</button>
      <img id="galleryImage" src="" alt="Enlarged photo" />
      <div class="gallery-controls">
        <button id="prevImgBtn">❮ Prev</button>
        <span id="galleryCounter">1 / 1</span>
        <button id="nextImgBtn">Next ❯</button>
      </div>
    </div>
  </div>

  <!-- Link to JS external file -->
  <script src="app.js"></script>
</body>
</html>
